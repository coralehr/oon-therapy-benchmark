name: Rebuild benchmark (open PR with refreshed data)

# Rebuilds the dataset from public CMS data and opens a PR if the committed data
# changed. Public data only, no secrets. The PR is reviewed and landed by a human
# so the committed snapshot stays current instead of silently going stale.
on:
  workflow_dispatch:
    inputs:
      release_url:
        description: "Optional CMS RVU release zip URL (defaults to the latest pinned release)"
        required: false
        default: ""
  schedule:
    # Quarterly: 06:00 UTC on the 1st of Jan, Apr, Jul, Oct (after CMS quarterly RVU drops).
    - cron: "0 6 1 1,4,7,10 *"

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest

      - name: Fetch public CMS source data
        run: ./fetch_cms_data.sh ${{ inputs.release_url }}

      - name: Build dataset
        run: python3 build_baseline.py

      - name: Run tests
        run: |
          if ls tests/test_*.py test_*.py >/dev/null 2>&1; then
            python3 -m pytest -q
          else
            echo "No test files found; skipping pytest."
          fi

      - name: Upload compiled dataset
        uses: actions/upload-artifact@v4
        with:
          name: therapy-oon-benchmark-data
          path: |
            data/*.csv
            data/*.json
          if-no-files-found: error

      - name: Open PR if the committed data changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: data/*.csv,data/*.json
          branch: chore/quarterly-data-refresh
          title: "chore(data): quarterly CMS rebuild"
          commit-message: "chore(data): refresh therapy OON benchmark from latest CMS release"
          body: |
            Automated quarterly rebuild from public CMS RVU/GPCI data.
            Review the dataset diff and the snapshot_date/methodology_version bump before merging.
          delete-branch: true
